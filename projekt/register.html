<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regisztráció-FonalZoo</title>
  <link rel="stylesheet" href="register.css">
</head>
<body>
  <h2>Regisztráció (a belépéshez)</h2>
  <form id="registerForm">
    <br>
    Felhasználónév: <input type="text" id="username" required><br>
    Email: <input type="email" id="email" required><br>
    Jelszó: <input type="password" id="password" required><br>
    Születési dátum: <input type="date" id="birthdate" required><br><br>
    <button type="submit">Regisztráció</button>
  </form>
  <p>Van már fiókod? <a href="login.html">Bejelentkezés</a></p>


  <script type="module" src="register.js"></script>
</body>
</html>
